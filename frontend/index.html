<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HCT</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar"><div class="brand">HCT</div></header>
  <main class="page">
    <section class="hero card">
      <h1>Health Check Tool</h1>
      <p>Start a new health check and produce a concise leadership-ready report.</p>
      <a class="btn primary" href="customer-details.html">Start a new health check</a>
    </section>
    <section class="card">
      <h2>Past assessments</h2>
      <div id="past-list" class="list"></div>
    </section>
  </main>
  <script src="js/api.js"></script>
  <script>
    (async function load(){
      const host=document.getElementById('past-list');
      try{
        const items=await Api.listAssessments();
        if(!items.length){host.innerHTML='<p class="muted">No assessments yet.</p>';return;}
        host.innerHTML=items.map(a=>`<a class="list-item" href="assessment.html?id=${a.id}"><span>${a.customer_name}</span><span>${a.overall_score ?? 0}%</span></a>`).join('');
      }catch(e){host.innerHTML='<p class="muted">Failed to load assessments.</p>';}
    })();
  </script>
</body>
</html>
